name: Deploy to VM
on:
    push:
        branches: [main] # Runs on pushes to main
    workflow_dispatch: # Allow manual trigger from GitHub UI
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to VM via SSH
              uses: Wandalen/wretry.action@master # Retry SSH deploy on failure
              with:
                  action: appleboy/ssh-action@master # The actual ssh action
                  attempt_limit: 3
                  attempt_delay: 120000 # ms (2 minutes)
                  with: |
                      host: ${{ secrets.VM_HOST }}
                      username: ${{ secrets.VM_USER }}
                      key: ${{ secrets.VM_SSH_KEY }}
                      script: |
                          cd ~/CarrotBotJS-main
                          git pull origin main
                          npm install
                          npm run build
                          sudo systemctl restart carrotbot
